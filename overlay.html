<!doctype html>
<html lang="en" class="dark">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Select Region</title>
    <style>
      html,
      body,
      #overlay-root {
        margin: 0;
        padding: 0;
        width: 100%;
        height: 100%;
        overflow: hidden;
        background: transparent;
        cursor: crosshair;
        user-select: none;
        font-family: Inter, ui-sans-serif, system-ui, "Segoe UI", sans-serif;
      }
      /* Instant feedback shown before React mounts; React replaces #overlay-root. */
      #boot {
        position: fixed;
        inset: 0;
        background: rgba(8, 10, 16, 0.55);
      }
      #boot .hint {
        position: absolute;
        top: 24px;
        left: 50%;
        transform: translateX(-50%);
        background: rgba(22, 26, 36, 0.9);
        color: #9aa3b2;
        font-size: 13px;
        padding: 8px 16px;
        border-radius: 999px;
        border: 1px solid #262c3a;
      }
      #boot .hint b {
        color: #e7eaf0;
        font-weight: 600;
      }
    </style>
  </head>

  <body>
    <div id="overlay-root">
      <div id="boot">
        <div class="hint">Drag to select an area · <b>Esc</b> to cancel</div>
      </div>
    </div>
    <script type="module" src="/src/overlay-main.tsx"></script>
  </body>
</html>
