name: Bug Report
description: Something isn't working as expected
title: "[Bug]: "
labels: ["bug"]
body:
  - type: textarea
    id: description
    attributes:
      label: What happened?
      description: A clear description of the bug.
      placeholder: When I capture a region on my second monitor, the overlay appears on the wrong screen...
    validations:
      required: true

  - type: textarea
    id: reproduction
    attributes:
      label: Steps to reproduce
      placeholder: |
        1. Open Snapture
        2. Press Ctrl+Shift+2
        3. ...
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
    validations:
      required: true

  - type: input
    id: version
    attributes:
      label: Snapture version
      placeholder: "1.1.0"
    validations:
      required: true

  - type: dropdown
    id: os
    attributes:
      label: Operating system
      options:
        - Windows
        - macOS
        - Linux
    validations:
      required: true

  - type: input
    id: os-version
    attributes:
      label: OS version
      placeholder: "Windows 11 24H2 / macOS 15.2 / Ubuntu 24.04"

  - type: textarea
    id: context
    attributes:
      label: Additional context
      description: Screenshots, monitor setup (count, scaling, resolution), logs — anything that helps.
